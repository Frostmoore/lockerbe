# Broker MQTT — mosquitto + plugin go-auth (piano §9).
#
# ⚠️ Nessun accesso anonimo. Ogni client si autentica, e ogni client puo' parlare SOLO sui
# topic del proprio armadio: l'ACL del broker **e' il confine tra clienti sul canale
# realtime** (piano §3.3). Un chiosco che potesse sottoscrivere `locker/#` vedrebbe — e
# potrebbe eseguire — i comandi di apertura di tutti gli armadi di tutti i locali.

per_listener_settings false
allow_anonymous false

# Device (e, in FH, il FCV5003 vero).
listener 1883
protocol mqtt

# WebSocket: serve all'emulatore, che gira dentro un browser e non puo' parlare MQTT nativo.
listener 9001
protocol websockets

# ═══ AUTENTICAZIONE E ACL: LE DECIDE IL SERVER ═══
#
# Il broker non tiene nessun elenco di utenti: a ogni connessione e a ogni pubblicazione
# chiede al nostro Laravel. Cosi' una revoca ha effetto **immediato** — non "dopo che
# qualcuno ha rigenerato i file e ricaricato il broker".
auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_http_host host.docker.internal
auth_opt_http_port 8000
auth_opt_http_method POST
auth_opt_http_getuser_uri /api/v1/mqtt/user
auth_opt_http_superuser_uri /api/v1/mqtt/superuser
auth_opt_http_aclcheck_uri /api/v1/mqtt/acl
auth_opt_http_response_mode status
auth_opt_http_params_mode json

# Cache breve: alleggerisce il server senza rendere lenta la revoca.
auth_opt_cache true
auth_opt_cache_seconds 20
auth_opt_acl_cache_seconds 20

log_dest stdout
log_type error
log_type warning
log_type notice
