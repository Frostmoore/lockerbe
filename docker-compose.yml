# Infra di sviluppo per lockerbe.
#
# Postgres è obbligatorio (non SQLite): serve la Row Level Security (piano §3.2).
# In F5 qui si aggiungerà il broker MQTT (mosquitto) con listener TLS + WebSocket.

services:
  postgres:
    image: postgres:16-alpine
    container_name: locker-postgres
    restart: unless-stopped
    environment:
      # Superuser del container: usato SOLO dagli script di init.
      # I ruoli applicativi (locker_owner, locker_app) sono creati da docker/postgres/init.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - locker-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: locker-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - locker-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  locker-pgdata:
  locker-redisdata:
