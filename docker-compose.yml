# Infra di sviluppo per lockerbe.
#
# Postgres è obbligatorio (non SQLite): serve la Row Level Security (piano §3.2).

services:
  # ═══ IL BROKER MQTT (F5) ═══
  #
  # Non è mosquitto "liscio": è mosquitto con il plugin **go-auth**, configurato per
  # chiedere al NOSTRO SERVER, via HTTP, chi può connettersi e chi può pubblicare dove.
  #
  # ⚠️ Perché non i classici file `passwd` + `acl`: perché le credenziali dei chioschi
  # nascono a runtime (quando il tecnico preme "Attiva") e muoiono a runtime (quando si
  # revoca un chiosco rubato). Con file statici, una revoca avrebbe effetto solo dopo un
  # rigenera-e-ricarica — cioè, in pratica, "quando qualcuno se ne ricorda".
  #
  # Chiedendo al server, invece, la **revoca ha effetto immediato**: il chiosco revocato non
  # si connette più, punto. Era il debito che F5 doveva chiudere.
  mosquitto:
    image: iegomez/mosquitto-go-auth:latest
    container_name: locker-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT (device)
      - "9001:9001"    # WebSocket (l'emulatore, che gira nel browser)
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/etc/mosquitto/mosquitto.conf:ro
    extra_hosts:
      # Il broker deve poter chiamare il nostro Laravel, che gira sull'host (php artisan serve).
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16-alpine
    container_name: locker-postgres
    restart: unless-stopped
    environment:
      # Superuser del container: usato SOLO dagli script di init.
      # I ruoli applicativi (locker_owner, locker_app) sono creati da docker/postgres/init.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - locker-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: locker-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - locker-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  locker-pgdata:
  locker-redisdata:
